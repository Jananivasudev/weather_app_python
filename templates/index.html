<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body> 
    <center>
        <div class = "card">
            <h1 class = "title">Weather</h1>
            <div class = "search_box">
                     <!-- Search form -->
                    {% if not temp %}
                    <form method="POST" action="/">
                    <svg class = "search_icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
                    <path d="M0 0h24v24H0z" fill="none" />
                    <path fill="currentColor" d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14" />
                    </svg>
                    <input
                        type="text"
                        name="content"
                        placeholder="Enter city name"
                        required
                        >
                        <button type="submit">Search</button>
                    </form>
                    {% endif %}
                    {% if temp  %}
                    <div class = "result">
                        <p>{{city.title()}}</p>
                         <img src="https://cdn.meteocons.com/3.0.0-next.10/svg/fill/{{icon}}.svg" 
                        alt="{{description}}" 
                        class="weather-icon" />
                        <p class = "temp-text">{{temp}}°C</p>
                        <p>{{description}}</p>
                        <p>Last update at {{time}}</p>
                    </div>
                    <a href="/">Search another city</a>
                    {% endif %}
                    {% if error %}
                    <div class = 'error_message'>
                        <p>{{error}}</p>
                    </div>
                    {% endif %}

            </div>
        </div>
    </center>
